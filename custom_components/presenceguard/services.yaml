set_offline:
  name: Set offline
  description: >
    Sets the preferred Teams status of the signed-in account to Offline
    (OffWork) – appears signed out.

clear_presence:
  name: Clear status
  description: >
    Clears the preferred Teams status again (the real Teams status applies).

set_presence:
  name: Set status
  description: Sets a preferred Teams status.
  fields:
    availability:
      name: Availability
      description: Desired availability.
      required: true
      example: Busy
      selector:
        select:
          options:
            - Offline
            - Available
            - Busy
            - DoNotDisturb
            - BeRightBack
            - Away
    activity:
      name: Activity
      description: Optional activity (default = matching the availability).
      required: false
      example: InAMeeting
      selector:
        text:

set_status_message:
  name: Set status message
  description: >
    Sets the Teams status message (the free-text note). An empty message clears it.
  fields:
    message:
      name: Message
      description: The status message text. Leave empty to clear it.
      required: true
      example: "In a meeting until 3pm"
      selector:
        text:
    expiry_minutes:
      name: Expiry (minutes)
      description: Optional – clear the message automatically after this many minutes.
      required: false
      example: 120
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
          mode: box
