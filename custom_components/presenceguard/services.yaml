set_offline:
  name: Set offline
  description: >
    Sets the preferred Teams status of the signed-in account to Offline
    (OffWork) – appears signed out.

clear_presence:
  name: Clear status
  description: >
    Clears the preferred Teams status again (the real Teams status applies).

set_presence:
  name: Set status
  description: Sets a preferred Teams status.
  fields:
    availability:
      name: Availability
      description: Desired availability.
      required: true
      example: Busy
      selector:
        select:
          options:
            - Offline
            - Available
            - Busy
            - DoNotDisturb
            - BeRightBack
            - Away
    activity:
      name: Activity
      description: Optional activity (default = matching the availability).
      required: false
      example: InAMeeting
      selector:
        text:
