# PresenceGuard – Automationen
#
# Einbinden in configuration.yaml (eigener Namensraum, kollidiert nicht mit
# der HA-UI-Automation-Datei automations.yaml):
#   automation presenceguard: !include presenceguard/automations_presenceguard.yaml
#
# Zeitlogik:
#   * Mo-Fr 17:00  -> Offline setzen
#   * Mo-Fr 09:00  -> zuruecksetzen (gilt auch fuer Montagmorgen nach dem WE)
#   * Sa   00:00   -> Offline setzen
#   * Sonntag      -> KEINE Automation noetig: setUserPreferredPresence ohne
#                     expirationDuration haelt "Offline" als bevorzugten Status
#                     standardmaessig 7 Tage, ueberdauert also das Wochenende
#                     bis zum Reset am Montag 09:00.
#
# Jede Praesenz-Automation frischt zuerst den Token auf, erzwingt ein Update
# des Token-Sensors und ruft dann den passenden REST Command auf.

- id: presenceguard_set_offline_weekday
  alias: "PresenceGuard: Offline (Mo-Fr 17:00)"
  mode: single
  trigger:
    - platform: time
      at: "17:00:00"
  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
    - delay: "00:00:02"
    - service: rest_command.set_teams_offline

- id: presenceguard_clear_weekday
  alias: "PresenceGuard: Status zuruecksetzen (Mo-Fr 09:00)"
  mode: single
  trigger:
    - platform: time
      at: "09:00:00"
  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
    - delay: "00:00:02"
    - service: rest_command.clear_teams_presence

- id: presenceguard_set_offline_saturday
  alias: "PresenceGuard: Offline (Sa 00:00)"
  mode: single
  trigger:
    - platform: time
      at: "00:00:00"
  condition:
    - condition: time
      weekday: [sat]
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
    - delay: "00:00:02"
    - service: rest_command.set_teams_offline

- id: presenceguard_token_refresh
  alias: "PresenceGuard: Access Token erneuern (alle 30 Min + Start)"
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/30"
    - platform: homeassistant
      event: start
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
