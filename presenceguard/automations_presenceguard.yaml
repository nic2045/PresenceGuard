# PresenceGuard – Automationen
#
# Einbinden in configuration.yaml (eigener Namensraum, kollidiert nicht mit
# der HA-UI-Automation-Datei automations.yaml):
#   automation presenceguard: !include presenceguard/automations_presenceguard.yaml
#
# Zeitlogik:
#   * Mo-Fr 17:00  -> Offline setzen
#   * Mo-Fr 09:00  -> zuruecksetzen (gilt auch fuer Montagmorgen nach dem WE)
#   * Sa   00:00   -> Offline setzen
#   * Sonntag      -> KEINE Automation noetig: setUserPreferredPresence ohne
#                     expirationDuration haelt "Offline" als bevorzugten Status
#                     standardmaessig 7 Tage, ueberdauert also das Wochenende
#                     bis zum Reset am Montag 09:00.
#
# Jede Praesenz-Automation frischt zuerst den Token auf, erzwingt ein Update
# des Token-Sensors und ruft dann den passenden REST Command auf.

- id: presenceguard_set_offline_weekday
  alias: "PresenceGuard: Offline (Mo-Fr 17:00)"
  mode: single
  trigger:
    - platform: time
      at: "17:00:00"
  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
    - delay: "00:00:02"
    - service: rest_command.set_teams_offline

- id: presenceguard_clear_weekday
  alias: "PresenceGuard: Status zuruecksetzen (Mo-Fr 09:00)"
  mode: single
  trigger:
    - platform: time
      at: "09:00:00"
  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
    - delay: "00:00:02"
    - service: rest_command.clear_teams_presence

- id: presenceguard_set_offline_saturday
  alias: "PresenceGuard: Offline (Sa 00:00)"
  mode: single
  trigger:
    - platform: time
      at: "00:00:00"
  condition:
    - condition: time
      weekday: [sat]
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token
    - delay: "00:00:02"
    - service: rest_command.set_teams_offline

- id: presenceguard_token_refresh
  alias: "PresenceGuard: Access Token erneuern (alle 30 Min + Start)"
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/30"
    - platform: homeassistant
      event: start
  action:
    - service: shell_command.refresh_presence_token
    - delay: "00:00:03"
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.presence_token

# Warnung, wenn der Token erneuert werden muss. Sinnvoll v. a. beim delegierten
# Weg mit Conditional-Access "Sign-in frequency" (z. B. 14 Tage): dann laeuft der
# Refresh Token periodisch ab und du musst token_setup.sh erneut ausfuehren.
# Triggert, wenn (a) keine Token-Daten mehr da sind oder (b) der Token deutlich
# zu alt wird (Refresh klemmt). Voraussetzung: template_presenceguard.yaml ist
# eingebunden (binary_sensor.presenceguard_token).
# Tipp: persistent_notification durch notify.mobile_app_* ersetzen fuer Push.
- id: presenceguard_token_alert
  alias: "PresenceGuard: Warnung - Token erneuern"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.presenceguard_token
      to: "off"
      for: "00:15:00"
      id: getrennt
    - platform: numeric_state
      entity_id: binary_sensor.presenceguard_token
      attribute: token_age_minutes
      above: 90
      for: "00:05:00"
      id: veraltet
  action:
    - service: persistent_notification.create
      data:
        notification_id: presenceguard_token_alert
        title: "PresenceGuard: Token erneuern"
        message: >
          PresenceGuard kann den Teams-Status evtl. nicht mehr setzen
          (Ausloeser: {{ trigger.id }}). Wahrscheinliche Ursache: der Refresh
          Token ist abgelaufen - z. B. durch eine Conditional-Access
          "Sign-in frequency"-Policy. Bitte token_setup.sh erneut ausfuehren und
          presence_refresh_token in secrets.yaml aktualisieren.

# Hebt die Warnung auf, sobald der Token wieder frisch ist.
- id: presenceguard_token_alert_clear
  alias: "PresenceGuard: Warnung aufheben (Token frisch)"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: binary_sensor.presenceguard_token
      attribute: token_age_minutes
      below: 60
  condition:
    - condition: state
      entity_id: binary_sensor.presenceguard_token
      state: "on"
  action:
    - service: persistent_notification.dismiss
      data:
        notification_id: presenceguard_token_alert
