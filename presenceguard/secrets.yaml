# PresenceGuard – secrets.yaml (TEMPLATE)
#
# Diese Keys in deine bestehende /config/secrets.yaml übernehmen
# (NICHT diese Datei direkt verwenden – sie enthält nur Platzhalter).
# secrets.yaml gehört NICHT ins öffentliche Git-Repo.
#
# Es gibt ZWEI Auth-Wege (siehe entra_app_setup.md). Fülle die Keys für genau
# EINEN davon – token_refresh.sh erkennt den Modus automatisch:
#
#   A) DELEGIERT (Authorization Code Flow): presence_refresh_token setzen
#      (einmalig via token_setup.sh erzeugt). client_secret nur, wenn die App
#      ein Confidential Client ist – beim Public-Client-/PKCE-Weg leer lassen.
#
#   B) APP-ONLY (Client Credentials Flow): presence_client_secret setzen und
#      presence_refresh_token leer lassen.

# Application (client) ID aus der Entra App Registration
presence_client_id: "00000000-0000-0000-0000-000000000000"

# Directory (tenant) ID aus der Entra App Registration
presence_tenant_id: "00000000-0000-0000-0000-000000000000"

# Deine User Object ID (GUID) oder dein UPN (z. B. du@firma.de) – der Nutzer,
# dessen Teams-Status gesetzt wird.
presence_user_id: "00000000-0000-0000-0000-000000000000"

# --- Weg A: delegiert -------------------------------------------------------
# Refresh Token aus dem einmaligen Lauf von token_setup.sh. Wird im Betrieb
# automatisch rotiert und dann aus /config/presence_refresh_token.txt gelesen.
# Beim App-only-Weg (B) leer lassen ("").
presence_refresh_token: ""

# --- Weg B: App-only --------------------------------------------------------
# Client Secret (Value, nicht die Secret ID). PFLICHT für Client Credentials,
# optional für delegierte Confidential Clients. Beim Public-Client-/PKCE-Weg
# leer lassen ("").
presence_client_secret: ""
