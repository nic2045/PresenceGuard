# PresenceGuard – secrets.yaml (TEMPLATE)
#
# Diese Keys in deine bestehende /config/secrets.yaml übernehmen
# (NICHT diese Datei direkt verwenden – sie enthält nur Platzhalter).
# secrets.yaml gehört NICHT ins öffentliche Git-Repo.
#
# Auth-Modell: DELEGIERT (Authorization Code Flow, Berechtigung
# Presence.ReadWrite). Den Refresh Token erzeugst du einmalig mit
# token_setup.sh; danach hält token_refresh.sh das Access Token aktuell.

# Application (client) ID aus der Entra App Registration
presence_client_id: "00000000-0000-0000-0000-000000000000"

# Directory (tenant) ID aus der Entra App Registration
presence_tenant_id: "00000000-0000-0000-0000-000000000000"

# Refresh Token aus dem einmaligen Lauf von token_setup.sh. Wird im Betrieb
# automatisch rotiert und dann aus /config/presence_refresh_token.txt gelesen.
presence_refresh_token: "REPLACE_WITH_OUTPUT_OF_token_setup.sh"

# OPTIONAL – der Nutzer, dessen Teams-Status gesetzt wird.
# token_refresh.sh leitet die Object ID des angemeldeten Kontos automatisch
# via /me ab (vermeidet 401 "another user"). Du kannst diesen Key daher leer
# lassen. Falls gesetzt, bitte die Object ID (GUID), nicht die UPN.
presence_user_id: ""

# OPTIONAL – nur falls die App ein Confidential Client ist (public client
# flows = No). Beim empfohlenen Public-Client-/PKCE-Weg leer lassen ("").
presence_client_secret: ""
