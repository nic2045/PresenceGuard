name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a single rolling release PR. It is NOT auto-merged on purpose:
      # merge it manually (e.g. once a day) to cut one batched release. Merging
      # it yourself also triggers the tag/release immediately (no lag, unlike a
      # GITHUB_TOKEN auto-merge which wouldn't re-trigger this workflow).
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
